<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    @page {
      size: letter;
      margin: 0.4in;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-size: 10pt;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      line-height: 1.3;
      margin: 0;
      padding: 0;
    }

    h1 {
      font-size: 14pt;
      margin: 0 0 8px 0;
      padding-bottom: 4px;
      border-bottom: 1px solid #333;
    }

    h2 {
      font-size: 11pt;
      margin: 12px 0 6px 0;
      color: #333;
      border-bottom: 1px solid #ccc;
      padding-bottom: 3px;
    }

    h3 {
      font-size: 10pt;
      margin: 6px 0 3px 0;
    }

    p {
      margin: 4px 0;
    }

    /* Problem section - two columns */
    .problem-section {
      margin-bottom: 12px;
    }

    .problem-content {
      column-count: 2;
      column-gap: 20px;
      column-rule: 1px solid #ddd;
    }

    .problem-content p,
    .problem-content ul,
    .problem-content ol {
      break-inside: avoid;
    }

    /* Solutions section - single column */
    .solutions {
      margin-top: 10px;
    }

    .solution-section {
      margin-bottom: 15px;
    }

    .solution-section h2 {
      font-size: 11pt;
      margin: 10px 0 6px 0;
      padding-bottom: 3px;
      border-bottom: 1px solid #666;
      background: #f5f5f5;
      padding: 4px 6px;
    }

    /* Code blocks */
    pre {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 7.5pt;
      background: #f5f5f5;
      padding: 6px;
      border-radius: 3px;
      overflow-wrap: break-word;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin: 4px 0;
      line-height: 1.25;
    }

    code {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 8pt;
      background: #f0f0f0;
      padding: 1px 3px;
      border-radius: 2px;
    }

    pre code {
      background: none;
      padding: 0;
    }

    /* Lists */
    ul, ol {
      margin: 4px 0;
      padding-left: 18px;
    }

    li {
      margin: 2px 0;
    }

    /* Tables */
    table {
      border-collapse: collapse;
      font-size: 8pt;
      margin: 6px 0;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 3px 5px;
      text-align: left;
    }

    th {
      background: #f0f0f0;
    }

    /* Difficulty badges */
    .difficulty-easy {
      color: #00b341;
      font-weight: bold;
    }

    .difficulty-medium {
      color: #ffc01e;
      font-weight: bold;
    }

    .difficulty-hard {
      color: #ef4743;
      font-weight: bold;
    }

    /* Meta info */
    .meta {
      font-size: 9pt;
      color: #666;
      margin-bottom: 8px;
    }

    /* Strong/bold in problem */
    strong {
      font-weight: 600;
    }

    /* Syntax highlighting */
    .highlight .k { color: #008000; font-weight: bold; }  /* Keyword */
    .highlight .kd { color: #008000; font-weight: bold; } /* Keyword.Declaration */
    .highlight .kn { color: #008000; font-weight: bold; } /* Keyword.Namespace */
    .highlight .kp { color: #008000; }                    /* Keyword.Pseudo */
    .highlight .kr { color: #008000; font-weight: bold; } /* Keyword.Reserved */
    .highlight .kt { color: #B00040; }                    /* Keyword.Type */
    .highlight .n { color: #000000; }                     /* Name */
    .highlight .na { color: #7D9029; }                    /* Name.Attribute */
    .highlight .nb { color: #008000; }                    /* Name.Builtin */
    .highlight .nc { color: #0000FF; font-weight: bold; } /* Name.Class */
    .highlight .nf { color: #0000FF; }                    /* Name.Function */
    .highlight .nn { color: #0000FF; font-weight: bold; } /* Name.Namespace */
    .highlight .o { color: #666666; }                     /* Operator */
    .highlight .ow { color: #AA22FF; font-weight: bold; } /* Operator.Word */
    .highlight .c { color: #408080; font-style: italic; } /* Comment */
    .highlight .c1 { color: #408080; font-style: italic; }/* Comment.Single */
    .highlight .cm { color: #408080; font-style: italic; }/* Comment.Multiline */
    .highlight .s { color: #BA2121; }                     /* String */
    .highlight .s1 { color: #BA2121; }                    /* String.Single */
    .highlight .s2 { color: #BA2121; }                    /* String.Double */
    .highlight .mi { color: #666666; }                    /* Number.Integer */
    .highlight .mf { color: #666666; }                    /* Number.Float */
    .highlight .bp { color: #008000; }                    /* Name.Builtin.Pseudo */
  </style>
</head>
<body>
  <!-- Problem Section (two columns) -->
  <div class="problem-section">
    <h1>{{ number }}. {{ title }} <span class="difficulty-{{ difficulty|lower }}">{{ difficulty }}</span></h1>
    <div class="meta">
      Acceptance: {{ acceptance }} | <a href="{{ url }}">LeetCode</a>
    </div>
    <div class="problem-content">
      {{ problem_content | safe }}
    </div>
  </div>

  <!-- Solutions Section (single column) -->
  <div class="solutions">
    <div class="solution-section">
      <h2>Claude Opus Solution</h2>
      {{ claude_solution | safe }}
    </div>

    <div class="solution-section">
      <h2>GPT-5 Solution</h2>
      {{ gpt_solution | safe }}
    </div>
  </div>
</body>
</html>
