<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>leet-help</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #58a6ff;
      letter-spacing: 0.5px;
    }

    .filters {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-group { display: flex; gap: 4px; }

    .filter-btn {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid #30363d;
      background: transparent;
      color: #8b949e;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #58a6ff; color: #58a6ff; }
    .filter-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

    .difficulty-Easy.active   { background: #196c2e; border-color: #196c2e; }
    .difficulty-Medium.active { background: #9b5d0f; border-color: #9b5d0f; }
    .difficulty-Hard.active   { background: #6e1a1a; border-color: #6e1a1a; }

    .count-badge {
      margin-left: auto;
      font-size: 12px;
      color: #8b949e;
      white-space: nowrap;
    }

    /* ── Main layout: list | problem | solution ── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Problem list (leftmost column) ── */
    .problem-list {
      width: 240px;
      flex-shrink: 0;
      border-right: 1px solid #30363d;
      overflow-y: auto;
      background: #0d1117;
    }

    .problem-item {
      padding: 10px 16px;
      border-bottom: 1px solid #21262d;
      cursor: pointer;
      display: flex;
      align-items: baseline;
      gap: 8px;
      transition: background 0.1s;
    }

    .problem-item:hover { background: #161b22; }
    .problem-item.selected { background: #1c2d3f; border-left: 3px solid #58a6ff; }

    .problem-num {
      font-size: 11px;
      color: #8b949e;
      width: 28px;
      flex-shrink: 0;
      text-align: right;
    }

    .problem-title {
      font-size: 13px;
      color: #e6edf3;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 10px;
      flex-shrink: 0;
      font-weight: 500;
    }

    .badge-Easy   { background: #196c2e33; color: #3fb950; }
    .badge-Medium { background: #9b5d0f33; color: #d29922; }
    .badge-Hard   { background: #6e1a1a33; color: #f85149; }

    /* ── Two-pane viewer ── */
    .viewer {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Problem pane — always visible, fixed width */
    .problem-pane {
      width: 40%;
      min-width: 300px;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pane-header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .pane-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px 28px;
    }

    /* Solution pane — tabs + content */
    .solution-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .solution-tabs {
      display: flex;
      border-bottom: 1px solid #30363d;
      background: #161b22;
      padding: 0 16px;
      flex-shrink: 0;
    }

    .tab-btn {
      padding: 10px 16px;
      border: none;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: #8b949e;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: #e6edf3; }
    .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }

    /* ── Markdown styles (shared) ── */
    .md h1, .md h2, .md h3, .md h4 {
      color: #e6edf3;
      margin: 1.2em 0 0.5em;
      font-weight: 600;
    }
    .md h1 { font-size: 1.4em; border-bottom: 1px solid #30363d; padding-bottom: 0.3em; }
    .md h2 { font-size: 1.15em; }
    .md h3 { font-size: 1em; }

    .md p { color: #c9d1d9; line-height: 1.7; margin: 0.6em 0; }
    .md ul, .md ol { padding-left: 1.5em; color: #c9d1d9; line-height: 1.7; margin: 0.5em 0; }
    .md li { margin: 0.2em 0; }

    .md code {
      font-family: "SF Mono", "Fira Code", Consolas, monospace;
      font-size: 0.875em;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 1px 5px;
      color: #e6edf3;
    }

    .md pre {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      margin: 1em 0;
      overflow-x: auto;
    }

    .md pre code {
      background: transparent;
      border: none;
      padding: 16px;
      display: block;
      font-size: 13px;
      line-height: 1.6;
    }

    .md strong { color: #e6edf3; }
    .md em { color: #c9d1d9; }

    .md blockquote {
      border-left: 3px solid #30363d;
      padding-left: 1em;
      color: #8b949e;
      margin: 0.5em 0;
    }

    .md table {
      border-collapse: collapse;
      width: 100%;
      margin: 1em 0;
      font-size: 13px;
    }

    .md th, .md td {
      border: 1px solid #30363d;
      padding: 6px 12px;
      text-align: left;
    }

    .md th { background: #161b22; color: #e6edf3; }
    .md td { color: #c9d1d9; }
    .md hr { border: none; border-top: 1px solid #30363d; margin: 1.5em 0; }

    /* ── Empty state ── */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #8b949e;
      gap: 8px;
    }

    .empty-icon { font-size: 40px; }
    .empty-text { font-size: 14px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>
<body>

<header>
  <h1>leet-help</h1>

  <div class="filters">
    <div class="filter-group" id="difficulty-filters">
      <button class="filter-btn active" data-difficulty="">All</button>
      <button class="filter-btn difficulty-Easy" data-difficulty="Easy">Easy</button>
      <button class="filter-btn difficulty-Medium" data-difficulty="Medium">Medium</button>
      <button class="filter-btn difficulty-Hard" data-difficulty="Hard">Hard</button>
    </div>
    <div class="filter-group" id="category-filters">
      <button class="filter-btn active" data-category="">All Categories</button>
    </div>
  </div>

  <span class="count-badge" id="count-badge"></span>
</header>

<div class="main">

  <!-- Column 1: problem list -->
  <div class="problem-list" id="problem-list"></div>

  <!-- Column 2+3: two-pane viewer -->
  <div class="viewer">

    <!-- Problem pane (always shown) -->
    <div class="problem-pane">
      <div class="pane-header">Problem</div>
      <div class="pane-content" id="problem-content">
        <div class="empty">
          <div class="empty-icon">📋</div>
          <div class="empty-text">Select a problem</div>
        </div>
      </div>
    </div>

    <!-- Solution pane (tabs) -->
    <div class="solution-pane">
      <div class="solution-tabs" id="solution-tabs">
        <!-- tabs rendered here -->
      </div>
      <div class="pane-content" id="solution-content">
        <div class="empty">
          <div class="empty-icon">💡</div>
          <div class="empty-text">Select a problem to view solutions</div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  marked.use({
    renderer: {
      code(token) {
        const lang = token.lang || 'plaintext';
        const language = hljs.getLanguage(lang) ? lang : 'plaintext';
        const highlighted = hljs.highlight(token.text, { language }).value;
        return `<pre><code class="hljs language-${language}">${highlighted}</code></pre>`;
      }
    },
    gfm: true,
    breaks: false,
  });

  let allProblems = [];
  let activeDifficulty = '';
  let activeCategory = '';
  let selectedNumber = null;

  async function loadProblems() {
    const res = await fetch('/api/problems');
    allProblems = await res.json();
    populateCategoryFilters();
    renderList();
  }

  function populateCategoryFilters() {
    const categories = [...new Set(allProblems.map(p => p.Category))].sort();
    const container = document.getElementById('category-filters');
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.category = cat;
      btn.textContent = cat;
      container.appendChild(btn);
    });
  }

  function filteredProblems() {
    return allProblems.filter(p => {
      if (activeDifficulty && p.Difficulty !== activeDifficulty) return false;
      if (activeCategory && p.Category !== activeCategory) return false;
      return true;
    });
  }

  function renderList() {
    const problems = filteredProblems();
    const list = document.getElementById('problem-list');
    document.getElementById('count-badge').textContent =
      `${problems.length} problem${problems.length !== 1 ? 's' : ''}`;

    list.innerHTML = '';
    problems.forEach(p => {
      const item = document.createElement('div');
      item.className = 'problem-item' + (p.Number == selectedNumber ? ' selected' : '');
      item.innerHTML = `
        <span class="problem-num">${p.Number}</span>
        <span class="problem-title">${p.Title}</span>
        <span class="badge badge-${p.Difficulty}">${p.Difficulty}</span>
      `;
      item.addEventListener('click', () => selectProblem(parseInt(p.Number)));
      list.appendChild(item);
    });
  }

  function renderMd(markdown, containerId) {
    const el = document.getElementById(containerId);
    if (!markdown) {
      el.innerHTML = '<div class="empty"><div class="empty-text">No content found</div></div>';
      return;
    }
    el.innerHTML = `<div class="md">${marked.parse(markdown)}</div>`;
    el.scrollTop = 0;
  }

  async function selectProblem(number) {
    selectedNumber = number;
    renderList();

    // Show loading state in both panes
    document.getElementById('problem-content').innerHTML =
      '<div class="empty"><div class="empty-text">Loading…</div></div>';
    document.getElementById('solution-tabs').innerHTML = '';
    document.getElementById('solution-content').innerHTML =
      '<div class="empty"><div class="empty-text">Loading…</div></div>';

    const res = await fetch(`/api/problems/${number}/solutions`);
    const data = await res.json();

    // Always render problem in the left pane
    renderMd(data.problem || '', 'problem-content');

    // Build solution tabs, defaulting to Claude solution
    const solutions = data.solutions || [];
    const tabs = document.getElementById('solution-tabs');
    tabs.innerHTML = '';

    // Find the default tab: prefer one whose filename contains "claude", else first
    const defaultIdx = Math.max(0,
      solutions.findIndex(s => s.filename.toLowerCase().includes('claude'))
    );

    solutions.forEach((s, i) => {
      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (i === defaultIdx ? ' active' : '');
      btn.textContent = s.label;
      btn.addEventListener('click', () => {
        tabs.querySelectorAll('.tab-btn').forEach((b, j) => b.classList.toggle('active', j === i));
        renderMd(solutions[i].content, 'solution-content');
      });
      tabs.appendChild(btn);
    });

    if (solutions.length > 0) {
      renderMd(solutions[defaultIdx].content, 'solution-content');
    } else {
      document.getElementById('solution-content').innerHTML =
        '<div class="empty"><div class="empty-text">No solutions found</div></div>';
    }
  }

  // Filter wiring
  document.getElementById('difficulty-filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeDifficulty = btn.dataset.difficulty;
    document.querySelectorAll('#difficulty-filters .filter-btn')
      .forEach(b => b.classList.toggle('active', b === btn));
    renderList();
  });

  document.getElementById('category-filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    activeCategory = btn.dataset.category;
    document.querySelectorAll('#category-filters .filter-btn')
      .forEach(b => b.classList.toggle('active', b === btn));
    renderList();
  });

  loadProblems();
</script>
</body>
</html>
